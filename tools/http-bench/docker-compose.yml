# Compose stack for `anvil-bench` against a real Postgres + Redis. Matches the
# "production-shaped" benchmark setup the methodology doc describes.
#
# Usage:
#   docker compose -f tools/http-bench/docker-compose.yml up --build \
#                  --abort-on-container-exit bench
#
# Add `--exit-code-from bench` for CI to propagate the bench's exit status.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: bench
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 2s
      timeout: 2s
      retries: 30
    # Tuned for the bench — not production. Larger shared_buffers + no fsync
    # so the disk isn't the bottleneck when we're measuring framework cost.
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  bench:
    build:
      context: ../..
      dockerfile: tools/http-bench/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BENCH_DATABASE_URL: postgres://bench:bench@postgres:5432/bench
      REDIS_URL: redis://redis:6379
      RUST_LOG: warn
    # Default invocation: latency-vs-load sweep across the standard
    # concurrencies, on the Postgres endpoints. Override with extra CLI
    # args by appending after `bench` on the `docker compose run` line.
    command:
      - --sweep
      - --sweep-concurrencies
      - "1,4,16,64,128,256,512"
      - -s
      - "10"
      - --endpoint
      - db-row
