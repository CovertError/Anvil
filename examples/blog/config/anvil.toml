# Anvilforge server config — the NGINX-equivalent declaration.
# Apps can ship this as-is for plain HTTP on :8080, or uncomment the [tls] table
# and add cert/key paths to serve HTTPS directly without a reverse proxy.

bind = "0.0.0.0:8080"

# Virtual host gating. Empty list = accept any Host header.
# Wildcards: `"*.example.com"` matches any subdomain.
server_name = []
# server_name = ["example.com", "www.example.com", "*.example.com"]

# [tls]
# cert = "/etc/letsencrypt/live/example.com/fullchain.pem"
# key  = "/etc/letsencrypt/live/example.com/privkey.pem"

# When TLS is on, optionally bind a plain :80 listener that 301-redirects to https.
# [redirect_http]
# bind = "0.0.0.0:80"
# permanent = true
# target_host = "example.com"   # if omitted, the request's Host header is reused

# HSTS — sent on HTTPS responses only.
[hsts]
enabled = false
max_age = "1y"
include_subdomains = true
preload = false

[limits]
body_max = "10MB"
request_timeout = "30s"

[compression]
enabled = true
algorithms = ["gzip", "br"]
min_size = "1KB"

# Mount on-disk dirs at URL prefixes. Per-mount Cache-Control headers.
[static_files."/assets"]
dir = "public/build"
cache = "1y"

[static_files."/uploads"]
dir = "storage/public"
cache = "1d"

[rate_limit]
per_ip = "60/minute"

[rate_limit.routes]
"POST /login" = "5/minute"

[trusted_proxies]
# Honor X-Forwarded-* only from these CIDRs (when behind a known LB/proxy).
# Empty by default. Add internal LB ranges before turning the app loose on the public internet.
ranges = []

[access_log]
format = "combined"   # "combined" | "json" | "off"
# path = "storage/logs/access.log"

# ─── URL rewrites ─────────────────────────────────────────────────────────────
# Each rule has a regex `from`, a replacement `to`, and an optional `status`.
# `status = 301` (or 302/307/308) = redirect. Anything else = internal rewrite
# (the request URI is rewritten before reaching the handler).

# [[rewrites]]
# from = "^/old/(.*)$"
# to = "/new/$1"
# status = 301
#
# [[rewrites]]
# from = "^/static/(.*)$"
# to = "/assets/$1"

# ─── Trailing-slash policy ────────────────────────────────────────────────────
# mode = "always" | "never" | "ignore" (default)
# action = "redirect" (default) | "rewrite"

[trailing_slash]
mode = "ignore"
action = "redirect"

# ─── Custom error pages ───────────────────────────────────────────────────────
# Map of status code → file to render in place of the framework's default body.

# [error_pages]
# 404 = "resources/views/errors/404.html"
# 500 = "resources/views/errors/500.html"

# ─── Reverse proxy ────────────────────────────────────────────────────────────
# Forward path-prefix routes to other backends. Useful for fronting microservices
# or legacy apps without a separate reverse proxy in front of Anvil.

# [[proxy]]
# prefix = "/api/v2"
# upstream = "http://api-v2.internal:8080"
# strip_prefix = true
# preserve_host = false
# timeout = "30s"
# retries = 2

# ─── CORS ─────────────────────────────────────────────────────────────────────

[cors]
enabled = false
allow_origins = ["*"]
allow_methods = ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
allow_headers = ["Content-Type", "Authorization", "X-CSRF-TOKEN"]
expose_headers = []
allow_credentials = false
max_age = "1h"

# ─── IP allow/deny ────────────────────────────────────────────────────────────
# Path-scoped IP filtering. First matching prefix wins.

# [[ip_rules]]
# prefix = "/admin"
# action = "allow"
# ranges = ["10.0.0.0/8", "192.168.1.0/24"]

# [[ip_rules]]
# prefix = "/internal"
# action = "deny"
# ranges = ["0.0.0.0/0"]   # block everyone except earlier `allow` rules

# ─── HTTP Basic Auth ──────────────────────────────────────────────────────────
# Cheap protection for staging dashboards and admin paths.

# [[basic_auth]]
# prefix = "/admin"
# realm = "Admin Area"
# credentials = ["admin:secret", "ops:another-secret"]
